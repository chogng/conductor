<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conductor Studio</title>
  <style>
    html,
    body,
    #root {
      margin: 0;
      height: 100%;
      min-height: 100%;
      background: #f5f4ef;
      color: #222222;
      font-family: var(--font-family-base, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      overflow: hidden;
    }

    html.dark,
    html.dark body,
    html.dark #root {
      background: #0b0b0c;
      color: #f5f4ef;
    }

    html.light,
    html.light body,
    html.light #root {
      background: #f5f4ef;
      color: #222222;
    }

  </style>
  <!--
    Electron renderer bootstrap, mirroring VS Code's code/electron-browser/workbench entry.
    This script owns pre-React boot state such as splash, initial settings, language/theme,
    and the desktop "UI is ready" signal back to the main process.
  -->
  <script
    type="module"
    blocking="render"
    src="./desktop.main.ts"
  ></script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
