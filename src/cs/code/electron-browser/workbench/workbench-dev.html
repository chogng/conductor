<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      img-src 'self' data: blob:;
      script-src 'self' 'unsafe-eval' blob:;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' ws: http://localhost:* http://127.0.0.1:*;
      font-src 'self' data:;
    "
  />
  <link rel="icon" type="image/x-icon" href="/resources/server/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conductor Studio</title>
  <style>
    html,
    body,
    #root {
      margin: 0;
      height: 100%;
      min-height: 100%;
      background: #f5f4ef;
      color: #222222;
      font-family: var(--font-family-base, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      overflow: hidden;
    }

    html.dark,
    html.dark body,
    html.dark #root {
      background: #0b0b0c;
      color: #f5f4ef;
    }

    html.light,
    html.light body,
    html.light #root {
      background: #f5f4ef;
      color: #222222;
    }
  </style>
  <!--
    Development desktop workbench entry, matching VS Code's workbench-dev.html split.
    It keeps the Electron renderer bootstrap while allowing Vite HMR websocket traffic.
  -->
  <script
    type="module"
    blocking="render"
    src="./workbench.ts"
  ></script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
