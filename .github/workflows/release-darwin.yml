name: Release Darwin Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.2)"
        required: true
        type: string

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout (tag push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Guard source repository
        shell: pwsh
        run: |
          & build/github/verify-source-repository.ps1

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          & build/github/verify-release-tag.ps1 -Tag "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Build Darwin desktop bundle
        run: npm run build:desktop:bundle

      - name: Package Darwin desktop artifacts
        run: npx electron-builder --mac --publish never

      - name: Prepare Darwin release assets
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path "release" -File |
            Where-Object { $_.Extension -in ".dmg", ".zip" } |
            Sort-Object Name
          if (-not $artifacts) {
            throw "No Darwin release artifacts found in release/."
          }

          $checksumLines = foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -Path $artifact.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "{0}  {1}" -f $hash, $artifact.Name
          }
          Set-Content -Path "release/SHA256SUMS-darwin.txt" -Value $checksumLines -Encoding ascii

      - name: Mirror release assets to source repository
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_REPO: chogng/conductor
        run: |
          & build/github/upload-release-assets.ps1 -ReleaseTag $env:RELEASE_TAG -SourceRepo $env:SOURCE_REPO

      - name: Summarize release assets
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Darwin release extras'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Built macOS desktop `.dmg` and `.zip` artifacts into `release/`.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Source repo (`chogng/conductor`): mirrored Darwin release assets and `SHA256SUMS-darwin.txt`.'
