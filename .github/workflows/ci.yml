name: CI

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit
