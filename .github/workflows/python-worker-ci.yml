name: Python Worker CI

on:
  pull_request:
    paths:
      - "conductor-py/**"
      - "scripts/build-py-worker.ps1"
      - "scripts/verify-py-worker.mjs"
      - "scripts/origin-runner.test.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/python-worker-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-worker-validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup shared Windows toolchain
        uses: ./.github/actions/setup-windows-node-python

      - name: Install dependencies
        run: npm ci

      - name: Build Python worker
        run: npm run build:py-worker

      - name: Verify Python worker
        run: npm run verify:py-worker

      - name: Run Origin runner test
        run: npm run test:origin-runner
