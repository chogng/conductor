name: Python Worker CI

on:
  pull_request:
    paths:
      - "origin/**"
      - "scripts/build-origin-csv-worker.ps1"
      - "scripts/verify-origin-csv-worker.mjs"
      - "scripts/origin-runner.test.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/python-worker-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-worker-validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared Windows toolchain
        uses: ./.github/actions/setup-windows-node-python

      - name: Install dependencies
        run: npm ci

      - name: Build Origin CSV worker
        run: npm run build:origin-csv-worker

      - name: Verify Origin worker
        run: npm run verify:origin-worker

      - name: Run Origin runner test
        run: npm run test:origin-runner
