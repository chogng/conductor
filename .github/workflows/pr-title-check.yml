name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title semantic prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          echo "PR title: ${PR_TITLE}"

          pattern='^(feat|fix|docs|chore|refactor|perf|test)(\([a-z0-9._/-]+\))?!?: .+'
          if [[ ! "${PR_TITLE}" =~ ${pattern} ]]; then
            echo "PR title must follow semantic style."
            echo "Expected examples:"
            echo "  feat: add windows release checksum summary"
            echo "  fix(device-analysis): preserve manual axis range"
            echo "  docs: clarify desktop release flow"
            exit 1
          fi

      - name: Remind release-note intent
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          if [[ "${PR_BODY}" != *"## Release Notes"* ]]; then
            echo "PR body does not include the Release Notes section from the template."
            echo "Please keep the template sections when possible so releases stay readable."
          fi
