name: Deploy Privacy Policy Pages

on:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify privacy policy entrypoint exists
        run: |
          set -euo pipefail
          test -f public/index.html
          test -f public/privacy-policy/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload privacy policy site
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy privacy policy site
        id: deployment
        uses: actions/deploy-pages@v5
