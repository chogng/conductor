name: Rust CI

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "cli/**"
      - "extensions/**"
      - "src/features/device-analysis/**"
      - "src/cs/platform/rust/**"
      - "src/cs/code/electron-main/rustHost*.ts"
      - "scripts/build-conductor-rs.mjs"
      - "scripts/build-rs-xlsx-wasm.ps1"
      - "scripts/verify-conductor-rs-*.mjs"
      - "scripts/verify-rust-*.mjs"
      - "scripts/verify-rust-*.ps1"
      - "scripts/bench-device-analysis-phase3.*"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/rust-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared Windows toolchain
        uses: ./.github/actions/setup-windows-node-python

      - name: Install dependencies
        run: npm ci

      - name: Install Rust WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Build conductor-rs helper
        run: npm run build:conductor-rs

      - name: Verify conductor-rs helper
        run: npm run verify:conductor-rs-smoke

      - name: Build xlsx WASM extension
        run: npm run build:xlsx-wasm

      - name: Verify Rust XLS compatibility
        run: node scripts/verify-rust-xls-compat.mjs

      - name: Verify Rust origin export compatibility
        run: npm run verify:rust-origin-export
