name: Release Windows Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.2)"
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.CONDUCTOR }}
      UV_CACHE_DIR: ${{ github.workspace }}\\.device\\uv-cache
      UV_PYTHON_INSTALL_DIR: ${{ github.workspace }}\\.device\\uv-python
      PIP_CACHE_DIR: ${{ github.workspace }}\\.device\\pip-cache
      PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}\\.device\\pyinstaller-cache
      ELECTRON_CACHE: ${{ github.workspace }}\\.device\\electron-cache
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\\.device\\electron-builder-cache
      npm_config_cache: ${{ github.workspace }}\\.device\\npm-cache
    steps:
      - name: Checkout (tag push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Ensure .device cache dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".device" | Out-Null

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Guard source repository
        shell: pwsh
        run: |
          # Safety rail: this workflow must run from the private source repository.
          if ($env:GITHUB_REPOSITORY -eq "chogng/conductor-update") {
            throw "This workflow must run in the private source repository, not in chogng/conductor-update."
          }

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi

          node --input-type=module -e "import fs from 'node:fs'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const expected='v'+String(pkg.version||'').trim(); const tag=String(process.env.TAG||'').trim(); if (!tag) { console.error('Missing tag'); process.exit(1); } if (tag!==expected) { console.error('Tag/version mismatch: tag='+tag+' expected='+expected); process.exit(1); } console.log('OK: '+tag+' matches package.json version '+pkg.version);"
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Install dependencies
        run: npm ci

      - name: Build desktop artifacts
        run: npm run dist:desktop

      - name: Publish updater assets to public update repository
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          UPDATE_REPO: chogng/conductor-update
        run: |
          # Public repo is updater-only: keep uploads to minimum auto-update files.
          $releaseDir = Join-Path $PWD "release"
          if (-not (Test-Path -LiteralPath $releaseDir)) {
            throw "Release directory not found: $releaseDir"
          }

          $latestYmlPath = Join-Path $releaseDir "latest.yml"
          if (-not (Test-Path -LiteralPath $latestYmlPath)) {
            throw "Missing latest.yml in release/."
          }

          $setupAssets = Get-ChildItem -Path $releaseDir -File |
            Where-Object { $_.Name -like "*-setup.exe" } |
            Sort-Object Name

          if (-not $setupAssets) {
            throw "No installer assets (*-setup.exe) found in release/."
          }

          # Required by electron-updater on Windows: latest.yml + setup.exe + setup.exe.blockmap.
          $updaterAssets = @((Get-Item -LiteralPath $latestYmlPath))
          foreach ($setup in $setupAssets) {
            $blockmapPath = "$($setup.FullName).blockmap"
            if (-not (Test-Path -LiteralPath $blockmapPath)) {
              throw "Missing blockmap for $($setup.Name): $blockmapPath"
            }

            $updaterAssets += $setup
            $updaterAssets += Get-Item -LiteralPath $blockmapPath
          }

          $updaterAssets = $updaterAssets | Sort-Object FullName -Unique
          $assetPaths = $updaterAssets | ForEach-Object { $_.FullName }

          gh release view $env:RELEASE_TAG -R $env:UPDATE_REPO *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title $env:RELEASE_TAG --notes "Public updater channel assets only." -R $env:UPDATE_REPO
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create release $env:RELEASE_TAG in $env:UPDATE_REPO."
            }
          }

          gh release upload $env:RELEASE_TAG $assetPaths --clobber -R $env:UPDATE_REPO
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload updater assets to $env:UPDATE_REPO."
          }

      - name: Generate Windows release checksums
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path "release" -File |
            Where-Object { $_.Extension -in '.exe', '.zip', '.7z' } |
            Sort-Object Name

          if (-not $artifacts) {
            throw "No Windows release artifacts found in release/."
          }

          $checksumLines = foreach ($artifact in $artifacts) {
            $hash = (Get-FileHash -Path $artifact.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "{0}  {1}" -f $hash, $artifact.Name
          }

          Set-Content -Path "release/SHA256SUMS.txt" -Value $checksumLines -Encoding ascii

          $infoLines = @(
            "conductor Windows downloads"
            ""
            "These Windows binaries are unsigned. Microsoft Defender SmartScreen may show an 'Unknown publisher' warning the first time they are opened."
            ""
            "Recommended package:"
            "- Prefer the *-setup.exe installer for normal installs."
            "- Use the *-portable.zip archive for the broadest compatibility."
            "- Use the *-portable.7z archive if you prefer a smaller download and already use 7-Zip."
            ""
            "How to verify a download in PowerShell:"
            "1. Download the app file and SHA256SUMS.txt from this release."
            "2. Run: Get-FileHash .\\<filename> -Algorithm SHA256"
            "3. Compare the SHA256 value with the matching line in SHA256SUMS.txt."
            ""
            "Files in this release:"
          )

          $infoLines += $artifacts | ForEach-Object { "- $($_.Name)" }
          Set-Content -Path "release/WINDOWS-DOWNLOADS.txt" -Value $infoLines -Encoding utf8

      - name: Mirror release assets to source repository
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_REPO: chogng/conductor
        run: |
          # Private repo keeps full release set for internal traceability and rollback.
          $assets = Get-ChildItem -Path "release" -File | Sort-Object Name
          if (-not $assets) {
            throw "No release assets found in release/."
          }

          gh release view $env:RELEASE_TAG -R $env:SOURCE_REPO *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title $env:RELEASE_TAG --notes "Automated release artifacts from CI." -R $env:SOURCE_REPO
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create release $env:RELEASE_TAG in $env:SOURCE_REPO."
            }
          }

          $assetPaths = $assets | ForEach-Object { $_.FullName }
          gh release upload $env:RELEASE_TAG $assetPaths --clobber -R $env:SOURCE_REPO
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets to $env:SOURCE_REPO."
          }

      - name: Summarize release assets
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Windows release extras'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Public updater repo: uploaded only `latest.yml`, installer (`*-setup.exe`), and matching `.blockmap`.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Source repo (`chogng/conductor`): mirrored full `release/` assets including `SHA256SUMS.txt` and `WINDOWS-DOWNLOADS.txt`.'
