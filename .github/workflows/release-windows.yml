name: Release Windows Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.2)"
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.CONDUCTOR }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      WIN_CSC_SUBJECT_NAME: ${{ secrets.WIN_CSC_SUBJECT_NAME }}
    steps:
      - name: Checkout (tag push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Setup shared Windows toolchain
        uses: ./.github/actions/setup-windows-node-python

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Guard source repository
        shell: pwsh
        run: |
          & .github\scripts\verify-source-repository.ps1

      - name: Verify tag matches package.json version
        shell: pwsh
        run: |
          & .github\scripts\verify-release-tag.ps1 -Tag "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"

      - name: Install dependencies
        run: npm ci

      - name: Build desktop installer/ZIP artifacts
        run: npm run dist:desktop

      - name: Build Microsoft Store AppX artifact
        run: npm run dist:desktop:store

      - name: Prepare Windows release assets
        id: release_assets
        uses: ./.github/actions/prepare-windows-release-assets

      - name: Publish updater assets to public update repository
        uses: ./.github/actions/publish-windows-updater-assets
        with:
          release-tag: ${{ steps.release_meta.outputs.tag }}

      - name: Mirror release assets to source repository
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          SOURCE_REPO: chogng/conductor
        run: |
          # Private repo keeps full release set for internal traceability and rollback.
          $assets = Get-ChildItem -Path "release" -File | Sort-Object Name
          if (-not $assets) {
            throw "No release assets found in release/."
          }

          gh release view $env:RELEASE_TAG -R $env:SOURCE_REPO *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --title $env:RELEASE_TAG --generate-notes -R $env:SOURCE_REPO
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create release $env:RELEASE_TAG in $env:SOURCE_REPO."
            }
          }

          $assetPaths = $assets | ForEach-Object { $_.FullName }
          gh release upload $env:RELEASE_TAG $assetPaths --clobber -R $env:SOURCE_REPO
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release assets to $env:SOURCE_REPO."
          }

      - name: Summarize release assets
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Windows release extras'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Public updater repo: uploaded only `latest.yml`, installer (`*-setup.exe`), and matching `.blockmap`.'
          if ("${{ steps.release_assets.outputs.signed }}" -eq "true") {
            $subject = "${{ steps.release_assets.outputs.subject }}"
            if ([string]::IsNullOrWhiteSpace($subject)) {
              $subject = "configured code-signing certificate"
            }
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Signing: executable artifacts are Authenticode-signed by $subject."
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Signing: executable artifacts are unsigned, so SmartScreen may show an unknown publisher warning.'
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Microsoft Store: built the `*-store.appx` package and mirrored it to the source repo release for Partner Center upload.'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- Source repo (`chogng/conductor`): mirrored full `release/` assets including `SHA256SUMS.txt`, `WINDOWS-DOWNLOADS.txt`, and `WINDOWS-SIGNATURES.txt`.'
