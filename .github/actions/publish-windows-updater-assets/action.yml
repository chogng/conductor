name: Publish Windows Updater Assets
description: Upload the minimum Electron updater assets to the public updater repository.

inputs:
  release-tag:
    description: Release tag to create or update
    required: true
  update-repo:
    description: GitHub repository that hosts public updater assets
    required: false
    default: chogng/conductor-update
  release-dir:
    description: Directory that contains built Windows release artifacts
    required: false
    default: release

runs:
  using: composite
  steps:
    - name: Publish updater assets
      shell: pwsh
      run: |
        & (Join-Path $env:GITHUB_WORKSPACE "build\win32\publish-updater-assets.ps1") -ReleaseTag "${{ inputs.release-tag }}" -UpdateRepo "${{ inputs.update-repo }}" -ReleaseDir "${{ inputs.release-dir }}"
