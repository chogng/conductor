<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Analysis Studio</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #f5f4ef;
      color: #222222;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #boot-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4ef;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    #boot-splash.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-splash-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 24px 28px;
      border: 1px solid rgba(34, 34, 34, 0.08);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(12px);
    }

    .boot-splash-spinner {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 2px solid rgba(34, 34, 34, 0.14);
      border-top-color: #222222;
      animation: boot-spin 0.9s linear infinite;
    }

    .boot-splash-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .boot-splash-subtitle {
      font-size: 12px;
      color: rgba(34, 34, 34, 0.65);
    }

    @keyframes boot-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (prefers-color-scheme: dark) {
      html,
      body,
      #boot-splash {
        background: #0b0b0c;
        color: #f5f4ef;
      }

      .boot-splash-card {
        border-color: rgba(245, 244, 239, 0.08);
        background: rgba(18, 18, 20, 0.88);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      .boot-splash-spinner {
        border-color: rgba(245, 244, 239, 0.14);
        border-top-color: #f5f4ef;
      }

      .boot-splash-subtitle {
        color: rgba(245, 244, 239, 0.66);
      }
    }
  </style>
</head>

<body>
  <div id="boot-splash" aria-hidden="true">
    <div class="boot-splash-card">
      <div class="boot-splash-spinner"></div>
      <div class="boot-splash-title">Device Analysis Studio</div>
      <div class="boot-splash-subtitle">Launching workspace…</div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
